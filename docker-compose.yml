version: '3.8'

services:
  postgres:
    image: postgres
    container_name: wingman-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: content_db
    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: wingman-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    ports:
      - "6379:6379"