version: '3.9'

# Dev compose — runs all implemented services.
# Run with: docker-compose -f docker-compose.dev.yml up --build
#
# Required env vars (create a .env file at the project root or export them):
#   GEMINI_API_KEY          — Google Gemini API key (caption generation)
#   OPENAI_API_KEY          — OpenAI API key (caption generation fallback)
#   AI_IMAGE_API_URL        — Image generation API endpoint (optional)
#   AI_IMAGE_API_KEY        — Image generation API key (optional)
#   TELEGRAM_BOT_TOKEN      — Telegram bot token (notifications + publishing)
#   TELEGRAM_CHAT_ID        — Telegram chat ID for manager notifications
#   TELEGRAM_CHANNEL_ID     — Telegram channel ID for publishing posts

services:

  # ─── Service discovery ───────────────────────────────────────────────────────
  consul:
    image: hashicorp/consul:1.17
    container_name: wingman-consul
    ports:
      - "8500:8500"
    command: agent -dev -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Message broker ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: wingman-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Databases ───────────────────────────────────────────────────────────────
  user-db:
    image: postgres:15
    container_name: wingman-user-db
    restart: always
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
      - ./docker/init/user-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  content-db:
    image: postgres:15
    container_name: wingman-content-db
    restart: always
    environment:
      POSTGRES_DB: content_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - content-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  review-db:
    image: postgres:15
    container_name: wingman-review-db
    restart: always
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - review-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d review_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  query-db:
    image: postgres:15
    container_name: wingman-query-db
    restart: always
    environment:
      POSTGRES_DB: query_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - query-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d query_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  notif-db:
    image: postgres:15
    container_name: wingman-notif-db
    restart: always
    environment:
      POSTGRES_DB: notif_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - notif-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notif_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  schedule-db:
    image: postgres:15
    container_name: wingman-schedule-db
    restart: always
    environment:
      POSTGRES_DB: schedule_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - schedule-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schedule_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Services ────────────────────────────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: wingman-user-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DATABASE_URL: postgres://postgres:postgres@user-db:5432/user_db
      JWT_SECRET: devsecret
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: user-service
      SERVICE_PORT: 5001
    depends_on:
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy

  content-service:
    build: ./services/content-service
    container_name: wingman-content-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      DATABASE_URL: postgres://postgres:postgres@content-db:5432/content_db
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_IMAGE_API_URL: ${AI_IMAGE_API_URL:-}
      AI_IMAGE_API_KEY: ${AI_IMAGE_API_KEY:-}
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: content-service
      SERVICE_PORT: 5002
    depends_on:
      content-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy

  review-service:
    build: ./services/review-service
    container_name: wingman-review-service
    ports:
      - "5004:5004"
    environment:
      PORT: 5004
      DATABASE_URL: postgres://postgres:postgres@review-db:5432/review_db
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: review-service
      SERVICE_PORT: 5004
    depends_on:
      review-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy

  query-service:
    build: ./services/query-service
    container_name: wingman-query-service
    ports:
      - "5005:5005"
    environment:
      PORT: 5005
      DATABASE_URL: postgres://postgres:postgres@query-db:5432/query_db
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: query-service
      SERVICE_PORT: 5005
    depends_on:
      query-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy

  realtime-service:
    build: ./services/realtime-service
    container_name: wingman-realtime-service
    ports:
      - "5006:5006"
    environment:
      PORT: 5006
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      JWT_SECRET: devsecret
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: realtime-service
      SERVICE_PORT: 5006
    depends_on:
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    container_name: wingman-notification-service
    ports:
      - "5007:5007"
    environment:
      PORT: 5007
      DATABASE_URL: postgres://postgres:postgres@notif-db:5432/notif_db
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: notification-service
      SERVICE_PORT: 5007
    depends_on:
      notif-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy

  scheduler-service:
    build: ./services/scheduler-service
    container_name: wingman-scheduler-service
    ports:
      - "5008:5008"
    environment:
      PORT: 5008
      DATABASE_URL: postgres://postgres:postgres@schedule-db:5432/schedule_db
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: scheduler-service
      SERVICE_PORT: 5008
    depends_on:
      schedule-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy

  publisher-service:
    build: ./services/publisher-service
    container_name: wingman-publisher-service
    ports:
      - "5009:5009"
    environment:
      PORT: 5009
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      CONSUL_URL: http://consul:8500
      SERVICE_NAME: publisher-service
      SERVICE_PORT: 5009
    depends_on:
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy

  api-gateway:
    build: ./services/api-gateway
    container_name: wingman-api-gateway
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: devsecret
      CONSUL_URL: http://consul:8500
    depends_on:
      consul:
        condition: service_healthy
      user-service:
        condition: service_started
      content-service:
        condition: service_started
      query-service:
        condition: service_started
      review-service:
        condition: service_started
      notification-service:
        condition: service_started
      scheduler-service:
        condition: service_started

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: wingman-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:5006
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api-gateway
      - realtime-service

volumes:
  user-db-data:
  content-db-data:
  review-db-data:
  query-db-data:
  notif-db-data:
  schedule-db-data:
